<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{CSRF_TOKEN}}">
  {{FB_BEARER_META}}
  <title>FileBeam — /{{PAGE_TITLE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    a { color: #5ba4f5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #5ba4f5; }
    .role-wo .breadcrumb, .role-wo table { display: none; }
    #disk-info { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: #888; }
    #disk-track { width: 100px; height: 7px; background: #2a2d3e; border-radius: 4px; overflow: hidden; }
    #disk-fill  { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .breadcrumb {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 1.5rem;
      word-break: break-all;
    }
    .breadcrumb a { color: #aaa; }
    .breadcrumb span { color: #e0e0e0; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1d27;
      border-radius: 8px;
      overflow: hidden;
    }
    thead tr { background: #222536; }
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      font-weight: 600;
    }
    td { padding: 0.65rem 1rem; font-size: 0.9rem; border-top: 1px solid #252836; }
    tr:hover td { background: #20233a; }
    .icon { width: 1.2em; display: inline-block; }
    .name { display: flex; align-items: center; gap: 0.5rem; }
    .size, .modified { color: #888; font-size: 0.82rem; white-space: nowrap; }
    .empty { text-align: center; padding: 3rem; color: #555; }
    .upload-section {
      margin-top: 2rem;
      background: #1a1d27;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    .upload-section h2 { font-size: 0.95rem; color: #888; margin-bottom: 1rem; }
    .drop-zone {
      border: 2px dashed #333;
      border-radius: 6px;
      padding: 2rem;
      text-align: center;
      color: #555;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #5ba4f5;
      background: #1e2235;
      color: #aaa;
    }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .drop-zone .hint { font-size: 0.85rem; margin-top: 0.4rem; }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1.25rem;
      background: #5ba4f5;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { background: #3d8fe0; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
    }
    .btn-secondary:hover { background: #252836; border-color: #5ba4f5; color: #e0e0e0; }
    #upload-queue { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .q-row {
      display: grid;
      grid-template-columns: 1fr auto 80px auto auto;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
    }
    .q-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .q-size { color: #888; white-space: nowrap; }
    .q-bar-wrap { height: 4px; background: #252836; border-radius: 2px; overflow: hidden; }
    .q-bar { height: 100%; width: 0%; background: #5ba4f5; border-radius: 2px; transition: width 0.15s; }
    .q-status { text-align: right; white-space: nowrap; color: #888; min-width: 5rem; }
    .q-ok  { color: #4caf50; }
    .q-err { color: #f44336; }
    .q-dim { color: #555; }
    .q-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85rem; opacity: 0.6;
    }
    .q-btn:hover { opacity: 1; background: #252836; }
    .actions { text-align: right; white-space: nowrap; }
    .act-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      opacity: 0.4;
      transition: opacity 0.15s;
    }
    tr:hover .act-btn { opacity: 1; }
    .act-btn:hover { background: #252836; }
    table.drag-active { outline: 2px dashed #5ba4f5; outline-offset: -2px; }
    .col-check { width:2rem; padding:.65rem .5rem .65rem 1rem; text-align:center; }
    th.col-check { padding:.75rem .5rem .75rem 1rem; }
    .file-select, #select-all { cursor:pointer; accent-color:#5ba4f5; width:1rem; height:1rem; }
    #bulk-toolbar { display:none; position:sticky; bottom:1.5rem; margin-top:1.5rem;
      background:#222536; border:1px solid #3a3f5a; border-radius:8px;
      padding:.75rem 1.25rem; align-items:center; gap:1rem;
      box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:50; }
    #bulk-toolbar.active { display:flex; }
    #bulk-count { font-size:.9rem; color:#aaa; }
    #bulk-count strong { color:#e0e0e0; }
    .bulk-btn { padding:.45rem 1rem; border-radius:5px; border:none;
      font-size:.85rem; font-weight:600; cursor:pointer; }
    #bulk-dl-btn { background:#5ba4f5; color:#fff; }
    #bulk-dl-btn:hover { background:#3d8fe0; }
    #bulk-del-btn { background:transparent; border:1px solid #e53e3e; color:#e53e3e; }
    #bulk-del-btn:hover { background:#3a1a1a; }
    /* ── Preview panel ── */
    #preview-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100;
    }
    #preview-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 101; background: #1a1d27; border-radius: 10px;
      width: min(92vw, 900px); max-height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #preview-header {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 1rem; background: #222536; flex-shrink: 0;
    }
    #preview-title { flex: 1; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #preview-download { font-size: .82rem; color: #5ba4f5; white-space: nowrap; }
    #preview-close {
      background: none; border: none; color: #aaa; font-size: 1.1rem;
      cursor: pointer; padding: .1rem .4rem; border-radius: 3px;
    }
    #preview-close:hover { background: #333; color: #fff; }
    #preview-content {
      overflow: auto; padding: 1rem; flex: 1;
      display: flex; align-items: flex-start; justify-content: center;
    }
    #preview-content img, #preview-content video { max-width: 100%; max-height: 75vh; }
    #preview-content iframe { width: 100%; height: 75vh; border: none; }
    #preview-content pre {
      white-space: pre-wrap; word-break: break-all; font-size: .82rem;
      color: #ccc; font-family: monospace; width: 100%; margin: 0;
    }
  </style>
</head>
<body class="{{BODY_CLASS}}">
<header>
  <h1>⚡ FileBeam</h1>
  <nav style="display:flex;align-items:center;gap:0.75rem;margin-left:1rem">{{NAV_LINKS}}</nav>
  <div id="disk-info"></div>
</header>
<div class="breadcrumb">{{BREADCRUMB}}</div>
<table {{TABLE_ATTRS}}>
  <thead>
{{THEAD}}
  </thead>
  <tbody>
{{ROWS}}
  </tbody>
</table>

<div id="bulk-toolbar">
  <span id="bulk-count"><strong id="bulk-count-n">0</strong> file(s) selected</span>
  <button id="bulk-dl-btn" class="bulk-btn">&#x2B07; Download as ZIP</button>
  <button id="bulk-del-btn" class="bulk-btn">&#x1F5D1; Delete selected</button>
</div>

{{UPLOAD_SECTION}}

<div id="preview-panel" hidden>
  <div id="preview-backdrop"></div>
  <div id="preview-box">
    <div id="preview-header">
      <span id="preview-title"></span>
      <a id="preview-download" href="" download>⬇ Download</a>
      <button id="preview-close">✕</button>
    </div>
    <div id="preview-content"></div>
  </div>
</div>

{{ADMIN_CONFIG_MODAL}}
<script>
{{APP_JS}}
</script>
{{EXPIRY_JS}}
</body>
</html>
