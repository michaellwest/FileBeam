# FileBeam — Docker Compose (Linux containers)
#
# Tip: use the wrapper scripts for automatic Linux/Windows container detection:
#   .\compose.ps1 up -d         # Windows PowerShell host
#   bash compose.sh up -d       # Linux / macOS / WSL host
#
# Or invoke docker compose directly (Linux containers only):
#   docker compose up -d        # start in the background
#   docker compose down         # stop and remove the container
#   docker compose logs -f      # follow logs
#
# Files are served from the ./share directory next to this file.
# The ./share directory is tracked in git (via .gitkeep) so it exists on checkout.
#
# To enable a password, read-only mode, or per-sender upload folders, add to the command:
#   command: ["--password", "secret", "--readonly"]
#   command: ["--upload", "/srv/share/upload", "--per-sender"]
#
# Inside a container the QR code shows the container's internal IP (e.g. 172.17.0.2).
# Use --advertise-ip to override with your host machine's LAN IP so the QR is scannable:
#   command: ["--download", "/srv/share/download", "--port", "8080", "--advertise-ip", "192.168.1.100"]

services:
  filebeam:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./share/download:/srv/share/download
      - ./share/upload:/srv/share/upload
    restart: unless-stopped
